name: expedition
description: Offline-first fitness tracking application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.8.0+1

  # Database
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Maps (configured for later phases)
  google_maps_flutter: ^2.12.1

  # Location (configured for later phases)
  geolocator: ^14.0.0

  # Permissions (configured for later phases)
  permission_handler: ^12.0.0+1

  # Charts (configured for later phases)
  fl_chart: ^1.0.0

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.5.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
