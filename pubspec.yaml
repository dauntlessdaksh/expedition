name: expedition
description: Offline-first fitness tracking application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.8.0+1

  # Database
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Maps (configured for later phases)
  google_maps_flutter: ^2.12.1

  # Location (configured for later phases)
  geolocator: ^14.0.0

  # Permissions (configured for later phases)
  permission_handler: ^12.0.0+1

  # Charts (configured for later phases)
  fl_chart: ^1.0.0

  # Utilities
  intl: ^0.20.2
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4
  flutter_web_auth_2: ^4.1.0
  spotify_sdk: ^3.0.2
  flutter_tts: ^4.2.3

  # 3D Models
  model_viewer_plus: ^1.10.0

  # Splash screen bridge (native → Flutter)
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.5.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/branding/app_icon.png
    - assets/branding/app_icon_foreground.png
    - assets/avatars/male/malerunning.glb
    - assets/avatars/male/maledancing.glb
    - assets/avatars/female/femrunning.glb
    - assets/avatars/female/femdancing.glb

flutter_native_splash:
  color: "#0A0E14"
  color_dark: "#0A0E14"
  image: assets/branding/app_icon.png
  image_dark: assets/branding/app_icon.png
  android_12:
    color: "#0A0E14"
    color_dark: "#0A0E14"
    image: assets/branding/app_icon.png
    image_dark: assets/branding/app_icon.png
  ios: true
  android: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0A0E14"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  remove_alpha_ios: true
